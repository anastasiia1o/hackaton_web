# Локальная конфигурация Streamlit для OreVision.
#
# gatherUsageStats=false отключает отправку анонимной телеметрии на серверы
# Streamlit. Без этого утверждение из README "всё локально, данные не уходят
# в интернет" было бы неточным по умолчанию.
[browser]
gatherUsageStats = false

[server]
# Снимаем ограничение на размер загружаемой фотографии: шлифы-панорамы бывают
# по сотни мегабайт. 5 ГБ — практический потолок (по умолчанию Streamlit режет
# на 200 МБ). Файл всё равно уменьшается при показе (viewer.load_display_image).
maxUploadSize = 5120
maxMessageSize = 5120

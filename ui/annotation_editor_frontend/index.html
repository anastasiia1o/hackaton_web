<!doctype html>
<!--
  OreVision — редактор разметки для active learning (упрощённый CVAT).

  Dependency-free vanilla-JS Streamlit-компонент (тот же ручной протокол, что
  и ui/region_picker_frontend и ui/folder_picker_frontend — три исходящих
  сообщения streamlit:componentReady/setFrameHeight/setComponentValue, один
  входящий streamlit:render).

  Источник истины по классам пикселей — НЕ цвет на канвасе, а отдельный
  Uint8Array classBuffer (по одному байту на пиксель = id класса). Видимый
  цветной слой (maskCanvas) — это лишь визуализация classBuffer через LUT
  цветов классов. При сохранении PNG кодируется НАПРЯМУЮ из classBuffer
  (R=G=B=classId, без сглаживания), поэтому итоговая semantic_mask.png всегда
  точный raster-first результат, а не то, что нарисовал canvas.
-->
<html>
<head>
<meta charset="utf-8" />
<style>
  html, body { margin: 0; padding: 0; background: transparent; font: 13px/1.3 system-ui, sans-serif; color: #e7e9ee; }
  #wrap { display: flex; flex-direction: column; gap: 8px; }
  #toolbar {
    display: flex; flex-wrap: wrap; gap: 6px; align-items: center;
    background: rgba(20,22,28,.9); border: 1px solid #3a3d44; border-radius: 8px; padding: 6px 8px;
  }
  .grp { display: flex; gap: 4px; align-items: center; padding-right: 8px; border-right: 1px solid #3a3d44; }
  .grp:last-child { border-right: none; }
  button { border: 1px solid #4a4d55; border-radius: 6px; background: #22252c; color: #e7e9ee;
    padding: 5px 9px; font-size: 12.5px; cursor: pointer; }
  button:hover { background: #2d313a; }
  button.active { background: #3a5fd1; border-color: #5c7ee6; }
  button:disabled { opacity: .4; cursor: default; }
  input[type=range] { width: 90px; }
  .swatch { width: 20px; height: 20px; border-radius: 4px; border: 2px solid transparent; cursor: pointer; box-sizing: border-box; }
  .swatch.active { border-color: #fff; }
  #stage-wrap { position: relative; width: 100%; line-height: 0; background: #111318; border: 1px solid #333; border-radius: 8px; overflow: hidden; }
  canvas { position: absolute; top: 0; left: 0; width: 100%; height: auto; image-rendering: pixelated; }
  #interact { position: absolute; top: 0; left: 0; width: 100%; height: 100%; cursor: crosshair; touch-action: none; }
  #status { color: #aeb2bb; font-size: 12px; padding: 2px 2px; }
  #status.dirty { color: #ffcf33; }
</style>
</head>
<body>
<div id="wrap">
  <div id="toolbar">
    <div class="grp">
      <button id="tool-brush" title="Кисть">✏️ Кисть</button>
      <button id="tool-polygon" title="Многоугольник">⬠ Полигон</button>
      <button id="tool-eraser" title="Стиратель">🧽 Ластик</button>
    </div>
    <div class="grp">
      <span>Размер:</span>
      <input id="brush-size" type="range" min="2" max="120" value="18" />
      <span id="brush-size-val">18</span>
    </div>
    <div class="grp" id="palette"></div>
    <div class="grp">
      <button id="undo" title="Отменить">↶ Undo</button>
      <button id="redo" title="Повторить">↷ Redo</button>
    </div>
    <div class="grp">
      <button id="fill-all" title="Присвоить выбранный класс всему участку">▦ Класс на весь участок</button>
      <button id="clear-mask" title="Очистить всю разметку">🗑 Очистить</button>
    </div>
    <div class="grp">
      <button id="finish-polygon" title="Замкнуть текущий многоугольник" style="display:none">✔ Замкнуть полигон</button>
      <button id="cancel-polygon" title="Отменить текущий многоугольник" style="display:none">✖ Отменить полигон</button>
    </div>
  </div>
  <div id="stage-wrap">
    <canvas id="imgCanvas"></canvas>
    <canvas id="maskCanvas"></canvas>
    <canvas id="previewCanvas"></canvas>
    <div id="interact"></div>
  </div>
  <div id="status">Готово.</div>
</div>
<script>
(function () {
  var HISTORY_LIMIT = 15;

  var imgCanvas = document.getElementById('imgCanvas');
  var maskCanvas = document.getElementById('maskCanvas');
  var previewCanvas = document.getElementById('previewCanvas');
  var interact = document.getElementById('interact');
  var stageWrap = document.getElementById('stage-wrap');
  var statusEl = document.getElementById('status');
  var paletteEl = document.getElementById('palette');

  var imgCtx = imgCanvas.getContext('2d');
  var maskCtx = maskCanvas.getContext('2d');
  var prevCtx = previewCanvas.getContext('2d');

  var W = 0, H = 0;
  var classBuffer = null;       // Uint8Array(W*H)
  var classes = [];             // [{id,name_ru,color:[r,g,b,a]}]
  var lut = {};                 // id -> [r,g,b,a]
  var activeClass = 0;
  var tool = 'brush';
  var brushSize = 18;
  var history = [], redoStack = [];
  var shapes = [];              // [{classId, points:[[x,y],...]}]
  var polyPoints = [];
  var lastRegionKey = null;
  var dirty = false;
  var localRevision = 0;
  var drawing = false;
  var lastPt = null;

  function post(msg) { window.parent.postMessage(Object.assign({ isStreamlitMessage: true }, msg), '*'); }
  function setHeight() { post({ type: 'streamlit:setFrameHeight', height: document.documentElement.scrollHeight || 400 }); }
  function setStatus(text, isDirty) {
    statusEl.textContent = text;
    statusEl.className = isDirty ? 'dirty' : '';
  }

  function rgba(c, alpha) {
    var a = (typeof alpha === 'number') ? alpha : (c[3] / 255);
    return 'rgba(' + c[0] + ',' + c[1] + ',' + c[2] + ',' + a + ')';
  }

  function buildPalette() {
    paletteEl.innerHTML = '';
    classes.forEach(function (c) {
      var sw = document.createElement('div');
      sw.className = 'swatch' + (c.id === activeClass ? ' active' : '');
      sw.title = c.name_ru;
      sw.style.background = c.color[3] > 0 ? rgba(c.color, 1) : 'repeating-conic-gradient(#888 0% 25%, #555 0% 50%) 0/8px 8px';
      sw.dataset.id = c.id;
      sw.addEventListener('click', function () {
        activeClass = c.id;
        buildPalette();
      });
      paletteEl.appendChild(sw);
    });
  }

  function setCanvasSize() {
    [imgCanvas, maskCanvas, previewCanvas].forEach(function (cv) {
      cv.width = W; cv.height = H;
    });
    stageWrap.style.paddingTop = (H / W * 100) + '%';
    stageWrap.style.height = '0';
  }

  // --- classBuffer <-> визуализация -----------------------------------------
  function redrawMaskFull() {
    var imgData = maskCtx.createImageData(W, H);
    var data = imgData.data;
    for (var i = 0; i < classBuffer.length; i++) {
      var c = lut[classBuffer[i]] || [0, 0, 0, 0];
      var o = i * 4;
      data[o] = c[0]; data[o + 1] = c[1]; data[o + 2] = c[2]; data[o + 3] = c[3];
    }
    maskCtx.putImageData(imgData, 0, 0);
  }

  function redrawMaskRegion(x0, y0, x1, y1) {
    x0 = Math.max(0, x0); y0 = Math.max(0, y0);
    x1 = Math.min(W, x1); y1 = Math.min(H, y1);
    var w = x1 - x0, h = y1 - y0;
    if (w <= 0 || h <= 0) return;
    var imgData = maskCtx.createImageData(w, h);
    var data = imgData.data;
    for (var yy = 0; yy < h; yy++) {
      for (var xx = 0; xx < w; xx++) {
        var idx = (y0 + yy) * W + (x0 + xx);
        var c = lut[classBuffer[idx]] || [0, 0, 0, 0];
        var o = (yy * w + xx) * 4;
        data[o] = c[0]; data[o + 1] = c[1]; data[o + 2] = c[2]; data[o + 3] = c[3];
      }
    }
    maskCtx.putImageData(imgData, x0, y0);
  }

  function pushHistory() {
    history.push(classBuffer.slice());
    if (history.length > HISTORY_LIMIT) history.shift();
    redoStack = [];
  }

  function markDirty() {
    dirty = true;
    localRevision += 1;
    setStatus('Есть несохранённые изменения (ревизия черновика #' + localRevision + ').', true);
  }

  // --- Кисть / ластик --------------------------------------------------------
  function stampCircle(cx, cy, r, classId) {
    var x0 = Math.max(0, Math.floor(cx - r)), x1 = Math.min(W, Math.ceil(cx + r));
    var y0 = Math.max(0, Math.floor(cy - r)), y1 = Math.min(H, Math.ceil(cy + r));
    var r2 = r * r;
    for (var y = y0; y < y1; y++) {
      for (var x = x0; x < x1; x++) {
        var dx = x - cx, dy = y - cy;
        if (dx * dx + dy * dy <= r2) classBuffer[y * W + x] = classId;
      }
    }
    return [x0, y0, x1, y1];
  }

  function strokeSegment(x0, y0, x1, y1, r, classId) {
    var dist = Math.hypot(x1 - x0, y1 - y0);
    var steps = Math.max(1, Math.ceil(dist / Math.max(2, r / 2)));
    var bbox = null;
    for (var i = 0; i <= steps; i++) {
      var t = i / steps;
      var b = stampCircle(x0 + (x1 - x0) * t, y0 + (y1 - y0) * t, r, classId);
      bbox = bbox ? [Math.min(bbox[0], b[0]), Math.min(bbox[1], b[1]), Math.max(bbox[2], b[2]), Math.max(bbox[3], b[3])] : b;
    }
    return bbox;
  }

  // --- Полигон ---------------------------------------------------------------
  function redrawPolygonPreview() {
    prevCtx.clearRect(0, 0, W, H);
    if (!polyPoints.length) return;
    prevCtx.strokeStyle = '#ffcf33';
    prevCtx.fillStyle = '#ffcf33';
    prevCtx.lineWidth = Math.max(1, W / 400);
    prevCtx.beginPath();
    prevCtx.moveTo(polyPoints[0][0], polyPoints[0][1]);
    for (var i = 1; i < polyPoints.length; i++) prevCtx.lineTo(polyPoints[i][0], polyPoints[i][1]);
    prevCtx.stroke();
    polyPoints.forEach(function (p) {
      prevCtx.beginPath();
      prevCtx.arc(p[0], p[1], Math.max(2, W / 300), 0, Math.PI * 2);
      prevCtx.fill();
    });
  }

  function finishPolygon() {
    if (polyPoints.length < 3) { cancelPolygon(); return; }
    pushHistory();
    var off = document.createElement('canvas');
    off.width = W; off.height = H;
    var octx = off.getContext('2d');
    octx.fillStyle = '#fff';
    octx.beginPath();
    octx.moveTo(polyPoints[0][0], polyPoints[0][1]);
    for (var i = 1; i < polyPoints.length; i++) octx.lineTo(polyPoints[i][0], polyPoints[i][1]);
    octx.closePath();
    octx.fill();
    var data = octx.getImageData(0, 0, W, H).data;
    for (var p = 0; p < classBuffer.length; p++) {
      if (data[p * 4 + 3] > 127) classBuffer[p] = activeClass;
    }
    shapes.push({ classId: activeClass, points: polyPoints.slice() });
    polyPoints = [];
    prevCtx.clearRect(0, 0, W, H);
    redrawMaskFull();
    markDirty();
    sendState();
    updatePolyButtons();
  }

  function cancelPolygon() {
    polyPoints = [];
    prevCtx.clearRect(0, 0, W, H);
    updatePolyButtons();
  }

  function updatePolyButtons() {
    var show = tool === 'polygon' && polyPoints.length > 0;
    document.getElementById('finish-polygon').style.display = show ? '' : 'none';
    document.getElementById('cancel-polygon').style.display = show ? '' : 'none';
  }

  // --- Координаты указателя в пикселях ROI ------------------------------------
  function ptPx(e) {
    var r = interact.getBoundingClientRect();
    var sx = W / r.width, sy = H / r.height;
    return { x: (e.clientX - r.left) * sx, y: (e.clientY - r.top) * sy };
  }

  interact.addEventListener('pointerdown', function (e) {
    var p = ptPx(e);
    if (tool === 'polygon') {
      polyPoints.push([p.x, p.y]);
      redrawPolygonPreview();
      updatePolyButtons();
      return;
    }
    drawing = true;
    lastPt = p;
    pushHistory();
    var cls = tool === 'eraser' ? 0 : activeClass;
    var b = stampCircle(p.x, p.y, brushSize / 2, cls);
    redrawMaskRegion(b[0], b[1], b[2], b[3]);
    interact.setPointerCapture(e.pointerId);
    e.preventDefault();
  });

  interact.addEventListener('pointermove', function (e) {
    if (!drawing) return;
    var p = ptPx(e);
    var cls = tool === 'eraser' ? 0 : activeClass;
    var b = strokeSegment(lastPt.x, lastPt.y, p.x, p.y, brushSize / 2, cls);
    if (b) redrawMaskRegion(b[0], b[1], b[2], b[3]);
    lastPt = p;
  });

  function endStroke() {
    if (!drawing) return;
    drawing = false;
    markDirty();
    sendState();
  }
  interact.addEventListener('pointerup', endStroke);
  interact.addEventListener('pointercancel', endStroke);
  interact.addEventListener('dblclick', function () {
    if (tool === 'polygon') finishPolygon();
  });

  // --- Инструменты / кнопки ---------------------------------------------------
  function setTool(t) {
    tool = t;
    ['brush', 'polygon', 'eraser'].forEach(function (name) {
      document.getElementById('tool-' + name).classList.toggle('active', name === t);
    });
    if (t !== 'polygon') cancelPolygon();
  }
  document.getElementById('tool-brush').onclick = function () { setTool('brush'); };
  document.getElementById('tool-polygon').onclick = function () { setTool('polygon'); };
  document.getElementById('tool-eraser').onclick = function () { setTool('eraser'); };
  document.getElementById('finish-polygon').onclick = finishPolygon;
  document.getElementById('cancel-polygon').onclick = cancelPolygon;

  document.getElementById('brush-size').addEventListener('input', function (e) {
    brushSize = parseInt(e.target.value, 10);
    document.getElementById('brush-size-val').textContent = brushSize;
  });

  document.getElementById('undo').onclick = function () {
    if (!history.length) return;
    redoStack.push(classBuffer.slice());
    classBuffer = history.pop();
    redrawMaskFull();
    markDirty();
    sendState();
  };
  document.getElementById('redo').onclick = function () {
    if (!redoStack.length) return;
    history.push(classBuffer.slice());
    classBuffer = redoStack.pop();
    redrawMaskFull();
    markDirty();
    sendState();
  };

  document.getElementById('fill-all').onclick = function () {
    var hasContent = classBuffer.some(function (v) { return v !== 0; });
    var cname = (classes.filter(function (c) { return c.id === activeClass; })[0] || {}).name_ru || activeClass;
    if (hasContent) {
      var ok = window.confirm(
        'Участок уже содержит разметку. Присвоить класс «' + cname + '» ВСЕМУ участку ' +
        'и заменить текущую разметку? Предыдущая версия останется в истории ревизий после сохранения.'
      );
      if (!ok) return;
    }
    pushHistory();
    classBuffer.fill(activeClass);
    shapes = [];
    redrawMaskFull();
    markDirty();
    sendState();
  };

  document.getElementById('clear-mask').onclick = function () {
    var hasContent = classBuffer.some(function (v) { return v !== 0; });
    if (hasContent) {
      var ok = window.confirm('Очистить ВСЮ разметку этого участка? Предыдущая версия останется в истории ревизий после сохранения.');
      if (!ok) return;
    }
    pushHistory();
    classBuffer.fill(0);
    shapes = [];
    redrawMaskFull();
    markDirty();
    sendState();
  };

  // --- Отправка состояния в Python --------------------------------------------
  function sendState() {
    var off = document.createElement('canvas');
    off.width = W; off.height = H;
    var octx = off.getContext('2d');
    var imgData = octx.createImageData(W, H);
    var data = imgData.data;
    for (var i = 0; i < classBuffer.length; i++) {
      var v = classBuffer[i];
      var o = i * 4;
      data[o] = v; data[o + 1] = v; data[o + 2] = v; data[o + 3] = 255;
    }
    octx.putImageData(imgData, 0, 0);
    var maskPngB64 = off.toDataURL('image/png').split(',')[1];

    var geojson = {
      type: 'FeatureCollection',
      features: shapes.map(function (s) {
        var ring = s.points.concat([s.points[0]]);
        return {
          type: 'Feature',
          properties: { class_id: s.classId },
          geometry: { type: 'Polygon', coordinates: [ring] },
        };
      }),
    };

    post({
      type: 'streamlit:setComponentValue',
      value: {
        mask_png_b64: maskPngB64,
        shapes: geojson,
        revision: localRevision,
        width: W, height: H,
      },
    });
  }

  // --- Инициализация / приход новых args ---------------------------------------
  function loadImage(src) {
    return new Promise(function (resolve) {
      var im = new Image();
      im.onload = function () { resolve(im); };
      im.src = src;
    });
  }

  function initBufferFromMask(maskImg) {
    var off = document.createElement('canvas');
    off.width = W; off.height = H;
    var octx = off.getContext('2d');
    octx.drawImage(maskImg, 0, 0, W, H);
    var data = octx.getImageData(0, 0, W, H).data;
    var buf = new Uint8Array(W * H);
    for (var i = 0; i < buf.length; i++) buf[i] = data[i * 4]; // R-канал = class id
    return buf;
  }

  function shapesFromGeoJSON(gj) {
    if (!gj || !gj.features) return [];
    return gj.features.map(function (f) {
      var ring = (f.geometry && f.geometry.coordinates && f.geometry.coordinates[0]) || [];
      var pts = ring.slice(0, ring.length > 1 ? ring.length - 1 : ring.length); // без замыкающей точки
      return { classId: (f.properties && f.properties.class_id) || 0, points: pts };
    });
  }

  function applyArgs(args) {
    args = args || {};
    classes = args.classes || [];
    lut = {};
    classes.forEach(function (c) { lut[c.id] = c.color; });
    if (!classes.some(function (c) { return c.id === activeClass; }) && classes.length) {
      activeClass = classes.filter(function (c) { return c.id !== 0; })[0] ? classes.filter(function (c) { return c.id !== 0; })[0].id : classes[0].id;
    }
    buildPalette();

    imgCanvas.style.display = args.show_image === false ? 'none' : '';
    maskCanvas.style.opacity = (typeof args.mask_opacity === 'number') ? args.mask_opacity : 0.7;
    maskCanvas.style.display = args.show_mask === false ? 'none' : '';

    var regionKey = args.region_key || null;
    if (regionKey !== lastRegionKey) {
      lastRegionKey = regionKey;
      W = args.width || 1; H = args.height || 1;
      setCanvasSize();
      history = []; redoStack = []; shapes = shapesFromGeoJSON(args.shapes); polyPoints = [];
      dirty = false; localRevision = 0;
      setStatus('Участок загружен.', false);

      Promise.all([
        loadImage(args.image_src),
        args.mask_src ? loadImage(args.mask_src) : Promise.resolve(null),
      ]).then(function (res) {
        var im = res[0], maskImg = res[1];
        imgCtx.clearRect(0, 0, W, H);
        imgCtx.drawImage(im, 0, 0, W, H);
        classBuffer = maskImg ? initBufferFromMask(maskImg) : new Uint8Array(W * H);
        redrawMaskFull();
        setHeight();
      });
    }
  }

  window.addEventListener('message', function (event) {
    var d = event.data;
    if (!d || d.type !== 'streamlit:render') return;
    applyArgs(d.args);
    setHeight();
  });

  window.addEventListener('resize', setHeight);
  post({ type: 'streamlit:componentReady', apiVersion: 1 });
  setHeight();
})();
</script>
</body>
</html>
